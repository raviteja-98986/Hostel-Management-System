{% extends "myapp/base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-4 p-md-5 border-0 text-center">
                <div class="mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                        <i class="fas fa-user-plus fs-3"></i>
                    </div>
                    <h3 class="fw-bold mb-1" style="font-family: 'Outfit', sans-serif;">Create an Account</h3>
                    <p class="text-muted small">Sign up to view hostel rooms</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold text-muted small text-uppercase">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">
                            {{ field.errors|striptags }}
                        </div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary-modern py-3">
                            Sign Up
                        </button>
                    </div>

                    <p class="text-muted small mt-4">
                        Already have an account? <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Format Django generated inputs */
    input[type="text"],
    input[type="password"],
    input[type="email"] {
        width: 100%;
        display: block;
        border: 1px solid #e2e8f0 !important;
        padding: 0.75rem 1rem !important;
        font-size: 0.95rem !important;
        background-color: white !important;
        border-radius: 0.375rem;
    }

    input:focus {
        box-shadow: none !important;
        border-color: var(--primary-color) !important;
        outline: none;
    }
    
    .helptext {
        font-size: 0.8rem;
        color: #64748b;
        display: block;
        margin-top: 0.25rem;
    }
    
    ul.errorlist {
        padding-left: 0;
        margin-top: 0.5rem;
        list-style: none;
        color: #ef4444;
        font-size: 0.85rem;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const passwordInputs = document.querySelectorAll('input[type="password"]');
        passwordInputs.forEach(input => {
            // Create a wrapper for the absolute icon
            const wrapper = document.createElement('div');
            wrapper.className = 'position-relative w-100';
            input.parentNode.insertBefore(wrapper, input);
            wrapper.appendChild(input);
            
            // Add right padding so text doesn't hide behind icon
            input.style.paddingRight = '2.5rem';

            // Create toggle button
            const toggleBtn = document.createElement('button');
            toggleBtn.type = 'button';
            toggleBtn.className = 'btn position-absolute end-0 top-50 translate-middle-y border-0 shadow-none text-muted';
            toggleBtn.style.zIndex = '5';
            toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';

            wrapper.appendChild(toggleBtn);

            toggleBtn.addEventListener('click', function() {
                if (input.type === 'password') {
                    input.type = 'text';
                    toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
                } else {
                    input.type = 'password';
                    toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
                }
            });
        });
    });
</script>
{% endblock %}
