{% extends "myapp/base.html" %}
{% block content %}

<div class="container" >

{% for floor, room_list in rooms.items %}

<h3 class="mt-4 text-center">{{ floor }} Floor</h3>

<div class="row justify-content-evenly">

{% for room in room_list %}

<div class="col-md-2 col-lg-3 mb-4 room-card">

  <a href="{% url 'room_details' room.room_no %}"
     class="text-decoration-none d-block">

    <div class="card
        {% if room.available_slots > 0 %}
            bg-success
        {% else %}
            bg-danger
        {% endif %}
        text-white">

      <div class="card-body text-center">
        <h2>Room {{ room.room_no }}</h2>
        <p>Sharing: {{ room.sharing }}</p>
        <p>Available: {{ room.available_slots }}</p>
      </div>

    </div>

  </a>

</div>

{% endfor %}
</div>
{% endfor %}

</div>

{% endblock %}
