{% extends "myapp/base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="glass-card p-4 p-md-5 border-0">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                        <i class="fas fa-exchange-alt fs-3"></i>
                    </div>
                    <h3 class="fw-bold mb-1" style="font-family: 'Outfit', sans-serif;">Shift Room</h3>
                    <p class="text-muted small">Move <strong>{{ person.name }}</strong> to a new room</p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Current Room</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fas fa-door-closed text-muted"></i></span>
                            <input type="text" class="form-control bg-white" value="Room {{ person.room.room_no }}"
                                disabled>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Select New Room</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fas fa-door-open text-primary"></i></span>
                            <select name="room_no" class="form-select" required>
                                <option value="" disabled selected>Choose available room...</option>
                                {% for room in available_rooms %}
                                    {% if room == person.room %}
                                    <option value="{{ room.room_no }}" disabled>
                                        Room {{ room.room_no }} (Current) - {{room.sharing}}
                                    </option>
                                    {% else %}
                                    <option value="{{ room.room_no }}">
                                        Room {{ room.room_no }} ({{ room.available_slots }} beds free) {{room.sharing}}
                                    </option>
                                    {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-text small">Only rooms with available capacity are shown.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary-modern py-3">
                            <i class="fas fa-check-circle me-2"></i> Confirm Shift
                        </button>
                        <a href="{% url 'room_details' person.room.room_no %}" class="btn btn-light py-3 border">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<style>
    .form-select {
        border: 1px solid #e2e8f0 !important;
        border-left: none !important;
        padding: 0.75rem 1rem !important;
        font-size: 0.95rem !important;
        background-color: white !important;
    }

    .form-select:focus {
        box-shadow: none !important;
        border-color: var(--primary-color) !important;
    }

    .input-group-text {
        border: 1px solid #e2e8f0 !important;
        background-color: #f8fafc !important;
        color: #64748b !important;
    }
</style>
{% endblock %}
