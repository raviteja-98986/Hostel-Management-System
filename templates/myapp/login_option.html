{% extends "myapp/base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row pt-4 mb-5">
        <div class="col-12 text-center">
            <h2 class="fw-bold mb-3" style="font-family: 'Outfit', sans-serif;">Select Login Type</h2>
            <p class="text-muted">Choose your account type to continue</p>
        </div>
    </div>

    <div class="row justify-content-center g-4 max-w-4xl mx-auto">
        <!-- User Login Card -->
        <div class="col-md-5">
            <a href="{% url 'login_user' %}" class="text-decoration-none h-100 d-block">
                <div class="glass-card login-card p-5 h-100 border-0 text-center">
                    <div class="icon-wrapper bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-4 mb-4">
                        <i class="fas fa-user fs-1"></i>
                    </div>
                    <h3 class="fw-bold mb-3 text-dark" style="font-family: 'Outfit', sans-serif;">Student Login</h3>
                    <p class="text-muted mb-0">Login to view rooms, availability, and your hostel details.</p>
                </div>
            </a>
        </div>

        <!-- Admin Login Card -->
        <div class="col-md-5">
            <a href="{% url 'login_admin' %}" class="text-decoration-none h-100 d-block">
                <div class="glass-card login-card p-5 h-100 border-0 text-center">
                    <div class="icon-wrapper bg-danger bg-opacity-10 text-danger rounded-circle d-inline-flex p-4 mb-4">
                        <i class="fas fa-user-shield fs-1"></i>
                    </div>
                    <h3 class="fw-bold mb-3 text-dark" style="font-family: 'Outfit', sans-serif;">Admin Login</h3>
                    <p class="text-muted mb-0">Login to manage rooms, add members, and monitor the hostel.</p>
                </div>
            </a>
        </div>
    </div>
</div>

<style>
    .login-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 2px solid transparent !important;
    }
    .login-card:hover {
        transform: translateY(-8px);
        border-color: var(--primary-color) !important;
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.15) !important;
    }
    .icon-wrapper {
        transition: all 0.3s ease;
    }
    .login-card:hover .icon-wrapper {
        transform: scale(1.1);
    }
</style>
{% endblock %}
