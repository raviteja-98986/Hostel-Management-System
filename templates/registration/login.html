{% extends "myapp/base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="glass-card p-4 p-md-5 border-0 text-center">
                <div class="mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                        <i class="fas fa-sign-in-alt fs-3"></i>
                    </div>
                    <h3 class="fw-bold mb-1" style="font-family: 'Outfit', sans-serif;">Welcome Back</h3>
                    <p class="text-muted small">Please login to your account</p>
                </div>

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold text-muted small text-uppercase">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold text-muted small text-uppercase">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger py-2 small mb-4">
                        Invalid username or password.
                    </div>
                    {% endif %}

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary-modern py-3">
                            Login
                        </button>
                    </div>

                    <p class="text-muted small">
                        Don't have an account? <a href="{% url 'signup' %}" class="text-primary fw-bold text-decoration-none">Sign up</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control {
        border: 1px solid #e2e8f0 !important;
        border-left: none !important;
        padding: 0.75rem 1rem !important;
        font-size: 0.95rem !important;
        background-color: white !important;
    }

    .form-control:focus {
        box-shadow: none !important;
        border-color: var(--primary-color) !important;
    }

    .input-group-text {
        border: 1px solid #e2e8f0 !important;
        background-color: #f8fafc !important;
        color: #64748b !important;
    }
</style>
{% endblock %}
